<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Colors In</title>

  <link
    rel="stylesheet"
    href="ColorsIn_style.css">
</head>

<body>

  <div class="container">

    <div id="LobbyScreen">
      <h1 id="gameTitle">
      <span class="c1">C</span>
      <span class="c2">O</span>
      <span class="c3">L</span>
      <span class="c4">O</span>
      <span class="c5">R</span>
      <span class="c6">S</span>

      <span class="separator"></span>

      <span class="c7">I</span>
      <span class="c8">N</span>
      </h1>

      <p id="subtitle">
        Escolha seu avatar
      </p>

      <div id="avatarGrid"></div>

      <h2 id="lobbyWaitingText">
        Aguardando host iniciar...
      </h2>
    </div>

    <div id="tutorialScreen">
      <h2 id="tutorialText">
        Veja o tutorial na tela!
      </h2>

      <div id="tutorialControls" style="display:none">
        <button onclick="SendTutorialAction('prev')">← Anterior</button>
        <button onclick="SendTutorialAction('next')">Próxima →</button>
        <button id="skipTutorialBtn" onclick="SendTutorialAction('skip')">Pular Tutorial</button>
      </div>
    </div>

    <div id="roundResultScreen">
      <h2>Veja o resultado na tela!</h2>
    </div>

    <div id="roundScoreScreen">
      <h2 id="roundScoreTitle">Placar</h2>
      <div id="scoreList"></div>
    </div>

    <div id="finalResultScreen">
      <h2>Placar Final</h2>
      <div id="finalScoreList"></div>

      <button
        class="homeButton"
        onclick="window.location.href='../index.html'"
      >
        Voltar ao Início
      </button>
    </div>


    <div id="hintScreen">
      <h2 id="myColorTitle"> 
        Essa é a sua cor
      </h2>
      <div id="myColorPreview"></div>

      <p>Digite uma dica para sua cor.</p>

      <input
          id="hintInput"
          maxlength="60"
          placeholder="Ex: Pôr do sol"/>

      <button id="sendHintButton">
          Enviar Dica
      </button>
    </div>

    <div id="waitingHintScreen">
          <h2 id="hintWaitingText">
              
          </h2>
      </div>

      <div id="guessScreen">
        <h2 id="guessHintText"> DICA </h2>

        <div id="guessGrid"></div>

        <button id="confirmGuessButton">
            Confirmar Escolha
        </button>
      </div>

      <div id="waitingGuessScreen">
        <h2>
            Aguardando os jogadores escolherem uma cor...
        </h2>
      </div>

      <button
        id="hostButton"
        style="display:none"
        onclick="SendHostCommand()">
        Começar Jogo
      </button>

  </div>

  <div
    id="pauseOverlay"
    class="pauseOverlay"
  >
    <div class="pauseOverlayCard">
      <h2>Jogo Pausado</h2>
      <p>Aguarde o host retomar...</p>
    </div>
  </div>

  <script
    type="module"
    src="ColorsIn_app.js">
  </script>

</body>
</html>
