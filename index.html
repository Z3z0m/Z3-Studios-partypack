<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Z3 Party Pack</title>

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body>

  <div class="container">

    <div id="loginScreen">

      <h1>Z3 Party Pack</h1>

      <!-- ROOM CODE -->

      <input
        type="text"
        id="roomCode"
        placeholder="Código da sala"
        maxlength="4"
        oninput="CheckRoomCode()"
      />

      <!-- GAME MODE -->

      <p id="gameModeText"></p>

      <!-- PLAYER NAME -->

      <input
        type="text"
        id="playerName"
        placeholder="Seu nome"
        maxlength="16"
      />

      <!-- JOIN BUTTON -->

      <button
        id="joinButton"
        onclick="joinRoom()"
        disabled
      >
        Entrar
      </button>

      <!-- STATUS -->

      <p id="status"></p>

    </div>

  </div>

  <script
    type="module"
    src="app.js"
  ></script>

</body>

</html>
