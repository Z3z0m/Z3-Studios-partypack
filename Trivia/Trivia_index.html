<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Trivia</title>

  <link
    rel="stylesheet"
    href="Trivia_style.css"
  />

</head>

<body>

  <div class="container">


    <!-- =========================
         LOBBY SCREEN
    ========================== -->

    <div
      id="lobbyScreen"
      class="screen active"
    >

      <h1 id="gameTitle">
        <span class="t1">T</span>
        <span class="t2">R</span>
        <span class="t3">I</span>
        <span class="t4">V</span>
        <span class="t5">I</span>
        <span class="t6">A</span>
      </h1>

      <h2 id="lobbyWaitingText">
        Aguardando host iniciar...
      </h2>

    </div>


    <!-- =========================
         TUTORIAL SCREEN
    ========================== -->

    <div
      id="tutorialScreen"
      class="screen"
    >

      <h2 id="tutorialText">
        Veja o tutorial na tela!
      </h2>

      <div id="tutorialControls">

        <div class="tutorialNavRow">

          <button onclick="SendTutorialAction('prev')">
            ← Anterior
          </button>

          <button onclick="SendTutorialAction('next')">
            Próxima →
          </button>

        </div>

        <button
          id="skipTutorialBtn"
          onclick="SendTutorialAction('skip')"
        >
          Pular Tutorial
        </button>

      </div>

    </div>


    <!-- =========================
         QUESTION SCREEN
    ========================== -->

    <div
      id="questionScreen"
      class="screen"
    >

      <div id="roundBadge">
        <span id="roundText">Pergunta 1</span>
      </div>

      <h2 id="questionText">
        Carregando pergunta...
      </h2>

      <div id="answerGrid">

        <button
          class="answerButton"
          onclick="AnswerQuestion(0)"
        >
          A. ...
        </button>

        <button
          class="answerButton"
          onclick="AnswerQuestion(1)"
        >
          B. ...
        </button>

        <button
          class="answerButton"
          onclick="AnswerQuestion(2)"
        >
          C. ...
        </button>

        <button
          class="answerButton"
          onclick="AnswerQuestion(3)"
        >
          D. ...
        </button>

      </div>

      <p id="waitingAnswerText"></p>

    </div>


    <!-- =========================
         RESULT SCREEN
    ========================== -->

    <div
      id="resultScreen"
      class="screen"
    >

      <h2 id="resultTitle">
        Resposta enviada!
      </h2>

      <p id="resultSubtitle">
        Aguardando o resultado...
      </p>

    </div>


    <!-- =========================
         SCOREBOARD SCREEN
    ========================== -->

    <div
      id="scoreboardScreen"
      class="screen"
    >

      <h2 id="scoreboardTitle">PLACAR</h2>

      <div id="scoreList"></div>

    </div>


    <!-- =========================
         FINAL SCORE SCREEN
    ========================== -->

    <div
      id="finalScoreScreen"
      class="screen"
    >

      <h2 id="finalScoreTitle">RESULTADO FINAL</h2>

      <div id="finalList"></div>

      <button
        class="homeButton"
        onclick="window.location.href='../index.html'"
      >
        Voltar ao Início
      </button>

    </div>


    <button
      id="hostButton"
      style="display:none"
      onclick="SendHostCommand()"
    >
      Começar Jogo
    </button>

  </div>

  <div
    id="pauseOverlay"
    class="pauseOverlay"
  >
    <div class="pauseOverlayCard">
      <h2>Jogo Pausado</h2>
      <p>Aguarde o host retomar...</p>
    </div>
  </div>

  <script
    type="module"
    src="Trivia_app.js"
  ></script>

</body>

</html>
