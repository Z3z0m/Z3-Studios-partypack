<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8"/>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>ChaosCourt</title>

  <link
    rel="stylesheet"
    href="ChaosCourt_style.css"
  />

</head>

<body>

  <div class="container">

    <h1>CHAOS COURT</h1>

    <p id="subtitle">
      Escolha sua identidade jurídica.
    </p>

    <!-- AVATAR GRID -->

    <div id="avatarGrid"></div>
    
    <!-- SHOW PLAYERS -->
    <div id="showPlayersScreen">
      <!-- DEFENDANT -->
      <div id="defendantContainer">
        <img id="defendantImage" />
        <p id="crimeText"></p>
      </div>
      <!-- DEFENSE -->
      <div id="defenseContainer">
        <img id="defenseImage" />
        <h2 id="defenseName"></h2>
      </div>
      <!-- PROSECUTION -->
      <div id="prosecutionContainer">
        <img id="prosecutionImage" />
        <h2 id="prosecutionName"></h2>
      </div>

    </div>

    <!-- DEBATE: DEFENSE ROLE -->
    <div id="defenseRoleScreen" class="roleScreen">
      <p id="defenseRoleCrime" class="roleCrime"></p>
      <h1 id="defenseRoleTitle"></h1>
    </div>

    <!-- DEBATE: PROSECUTION ROLE -->
    <div id="prosecutionRoleScreen" class="roleScreen">
      <p id="prosecutionRoleCrime" class="roleCrime"></p>
      <h1 id="prosecutionRoleTitle"></h1>
    </div>

    <!-- RESULT -->
    <div id="resultScreen">
      <h1 id="verdictText"></h1>
      <div id="voteTally">
        <p>Inocente: <span id="innocentCount">0</span></p>
        <p>Culpado: <span id="guiltyCount">0</span></p>
      </div>
    </div>

  </div>

  <!-- DEBATE: VOTING -->
  <div id="votingScreen">
    <button id="innocentButton" class="voteButton innocentButton">INOCENTE</button>
    <button id="guiltyButton" class="voteButton guiltyButton">CULPADO</button>
  </div>

  <div
    id="pauseOverlay"
    class="pauseOverlay"
  >
    <div class="pauseOverlayCard">
      <h2>Jogo Pausado</h2>
      <p>Aguarde o host retomar...</p>
    </div>
  </div>

  <script
    type="module"
    src="ChaosCourt_app.js"
  ></script>

</body>

</html>
