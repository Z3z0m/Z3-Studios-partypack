<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>FindAI</title>

  <link
    rel="stylesheet"
    href="FindAI_style.css"
  />

</head>

<body>

  <p id="categoryText" class="categoryBanner">
    Escreva como se fosse um...
  </p>

  <h2 id="voteCategoryText" class="categoryBanner">
    Vote na resposta que parece um...
  </h2>

  <div class="container">

    <!-- =========================
         LOBBY SCREEN
    ========================== -->

    <div
      id="lobbyScreen"
      class="screen active"
    >

      <h1>
        FindAI
      </h1>

      <p>
        Esperando o anfitrião começar...
      </p>

    </div>


    <!-- =========================
         PROMPT SCREEN
    ========================== -->

    <div
      id="promptScreen"
      class="screen"
    >

      <h2 id="promptText">
        Prompt aqui...
      </h2>

      <input
        type="text"
        id="answerInput"
        placeholder="Sua resposta..."
        onkeydown="HandleEnterKey(event, sendAnswer)"
      />

      <button
        id="sendButton"
        onclick="sendAnswer()"
      >
        Enviar Resposta
      </button>

      <p id="waitingText">
      </p>

    </div>


    <!-- =========================
         VOTING SCREEN
    ========================== -->

    <div
      id="votingScreen"
      class="screen"
    >

      <p id="votingPrompt">
        Prompt aqui...
      </p>

      <div id="votingAnswers">
      </div>

      <p id="votingWaitingText">
      </p>

    </div>


    <!-- =========================
         SHOW ANSWERS SCREEN
    ========================== -->

    <div
      id="showAnswersScreen"
      class="screen"
    >

      <h2>
        Mostrando respostas no Host
      </h2>

    </div>


    <!-- =========================
         RESULT SCREEN
    ========================== -->

    <div
      id="resultScreen"
      class="screen"
    >

      <h2>
        PLACAR
      </h2>

      <div id="resultScores">
      </div>

    </div>

  </div>

  <script
    type="module"
    src="FindAI_app.js"
  ></script>

</body>

</html>
